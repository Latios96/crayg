language: cpp

cache:
  directories:
    - ~/.conan/
addons:
  apt:
    sources:
      - ubuntu-toolchain-r-test
    packages:
      - gcc-7
      - g++-7
matrix:
  include:
    - os: linux
      compiler: gcc
      before_script:
        - virtualenv venv
        - source venv/bin/activate
        - export CC="${CC}-7";
        - export CXX="${CXX}-7";
      env: GCC_VERSION=7
      script:
        - pip install conan
        - conan remote add bincrafters https://api.bintray.com/conan/bincrafters/public-conan -f
        - conan remote add ppodsiadly https://api.bintray.com/conan/ppodsiadly/conan -f
        - mkdir build
        - cd build
        - cmake .. -DCMAKE_BUILD_TYPE=Release
        - make -j 4
        - ctest -V
    - os: osx
      compiler: clang
      script:
        - pip install conan
        - conan remote add bincrafters https://api.bintray.com/conan/bincrafters/public-conan -f
        - conan remote add ppodsiadly https://api.bintray.com/conan/ppodsiadly/conan -f
        - mkdir build
        - cd build
        - cmake .. -DCMAKE_BUILD_TYPE=Release
        - make -j 4
        - ctest -V
    - os: windows
      before_script:
        - choco install python --version=3.7.2
        - C:/Python37/python --version
      env: PATH=C:/Python37;C:/Python37/Scripts;%PATH%
      script:
        - C:/Python37/Scripts/pip install conan
        - C:/Python37/Scripts/conan remote add bincrafters https://api.bintray.com/conan/bincrafters/public-conan -f
        - C:/Python37/Scripts/conan remote add ppodsiadly https://api.bintray.com/conan/ppodsiadly/conan -f
        - call "C:/Program Files (x86)/Microsoft Visual Studio/2017/Community/VC/Auxiliary/Build/vcvarsall.bat" x64
        - mkdir build
        - cd build
        - cmake -G "Visual Studio 15 2017 Win64" ..
        - cmake --build .


deploy:
  provider: releases
  api_key:
    secure: 
  file: build/standalone/crayg-standalone
  skip_cleanup: true
  on:
    repo: Latios96/crayg
    tags: true
